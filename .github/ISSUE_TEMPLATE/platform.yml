name: Platform Support
description: Request or diagnose support for an OS or CPU architecture.
title: "platform: "
labels: ["platform"]
body:
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true
  - type: input
    id: architecture
    attributes:
      label: Architecture
      placeholder: x86_64, arm64, aarch64
    validations:
      required: true
  - type: input
    id: shell
    attributes:
      label: Shell
      placeholder: PowerShell, pwsh, bash, zsh, fish
  - type: textarea
    id: issue
    attributes:
      label: What happens?
      description: Include installer or uninstaller output if relevant.
    validations:
      required: true
